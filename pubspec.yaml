name: volt
description: "VOLT — Gestión de tareas y productividad basada en Voltios. Proyecto final Aplicaciones Móviles (Grupo 9-2)."
publish_to: "none"
version: 1.0.0+1

environment:
  sdk: ">=3.3.0 <4.0.0"
  flutter: ">=3.19.0"

dependencies:
  flutter:
    sdk: flutter

  # Supabase
  supabase_flutter: ^2.5.9

  # State management (Riverpod 2.x)
  flutter_riverpod: ^2.5.1
  riverpod_annotation: ^2.3.5

  # Routing
  go_router: ^14.2.0

  # Utils
  intl: ^0.19.0
  google_sign_in: ^6.2.1
  uuid: ^4.4.0
  equatable: ^2.0.5
  cupertino_icons: ^1.0.8

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^4.0.0
  riverpod_generator: ^2.4.0
  build_runner: ^2.4.11
  riverpod_lint: ^2.3.10

flutter:
  uses-material-design: true
